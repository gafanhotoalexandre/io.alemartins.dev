<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fluxo comparando Observable e Signal</title>
  <desc id="desc">Diagrama simplificado mostrando a passagem de dados do backend para o componente com Observable e com Signal.</desc>
  <rect width="1200" height="720" rx="32" fill="#FAFAFA"/>
  <rect x="72" y="84" width="250" height="112" rx="24" fill="#18181B"/>
  <text x="197" y="150" fill="white" font-size="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700">API / HttpClient</text>
  <rect x="72" y="286" width="250" height="152" rx="24" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="2"/>
  <text x="197" y="344" fill="#18181B" font-size="28" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700">Observable</text>
  <text x="197" y="386" fill="#52525B" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">pipe()</text>
  <text x="197" y="416" fill="#52525B" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">map()</text>
  <text x="197" y="446" fill="#52525B" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">async pipe</text>
  <rect x="452" y="286" width="296" height="152" rx="24" fill="#FFFFFF" stroke="#18181B" stroke-width="2"/>
  <text x="600" y="344" fill="#18181B" font-size="28" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700">toSignal()</text>
  <text x="600" y="392" fill="#52525B" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">estado síncrono local</text>
  <text x="600" y="422" fill="#52525B" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">computed()</text>
  <rect x="880" y="286" width="248" height="152" rx="24" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="2"/>
  <text x="1004" y="352" fill="#18181B" font-size="28" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700">Template</text>
  <text x="1004" y="394" fill="#52525B" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">render cirúrgico</text>
  <path d="M322 140H452" stroke="#18181B" stroke-width="8" stroke-linecap="round"/>
  <path d="M322 362H452" stroke="#18181B" stroke-width="8" stroke-linecap="round"/>
  <path d="M748 362H880" stroke="#18181B" stroke-width="8" stroke-linecap="round"/>
  <circle cx="387" cy="140" r="10" fill="#18181B"/>
  <circle cx="387" cy="362" r="10" fill="#18181B"/>
  <circle cx="814" cy="362" r="10" fill="#18181B"/>
  <text x="72" y="570" fill="#18181B" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="700">Menos carga cognitiva para o estado que não precisa ser um fluxo temporal.</text>
  <text x="72" y="620" fill="#71717A" font-size="24" font-family="Inter, Arial, sans-serif">Signals no lugar certo não substituem RxJS por moda, e sim por economia de complexidade.</text>
</svg>
