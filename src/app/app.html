<a
  href="#main-content"
  class="sr-only absolute left-4 top-4 z-50 rounded bg-zinc-900 px-4 py-2 text-sm font-medium text-white focus:not-sr-only"
>
  Pular para o conteúdo principal
</a>

<div class="min-h-screen flex flex-col selection:bg-zinc-200 selection:text-zinc-900 relative">
  <div class="fixed inset-0 bg-grid -z-20 pointer-events-none"></div>

  @if (isBlogRoute()) {
    <app-blog-header [brand]="data.brand" />
  } @else {
    <app-header [brand]="data.brand" [tabs]="data.tabs" [currentTab]="currentTab()" />
  }

  <main id="main-content" class="w-full max-w-5xl mx-auto px-6 pb-32 md:pb-24 flex-1">
    <router-outlet />
  </main>

  @if (!isBlogRoute()) {
    <app-mobile-nav [tabs]="data.tabs" [currentTab]="currentTab()" />
  }
</div>
