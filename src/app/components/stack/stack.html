<div class="max-w-4xl mt-4 md:mt-12 relative tab-content">
	<h2 class="text-2xl font-medium tracking-tight mb-12">{{ stack().heading }}</h2>

	<div
		class="absolute right-0 top-0 text-zinc-50 hidden md:block select-none pointer-events-none"
		style="font-family: monospace; font-size: 8rem; line-height: 1; transform: translateY(-30%);"
		aria-hidden="true"
	>
		&lt;/&gt;
	</div>

	<div class="grid grid-cols-1 md:grid-cols-3 gap-12 relative z-10">
		@for (category of stack().categories; track category.id) {
			<div class="bg-white/50 backdrop-blur-sm p-4 -ml-4 rounded-lg">
				<h3 class="text-sm font-medium text-zinc-900 uppercase tracking-widest mb-6 flex items-center gap-2">
					@switch (category.id) {
						@case ('backend') {
							<svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
							</svg>
						}
						@case ('architecture') {
							<svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
							</svg>
						}
						@case ('frontend') {
							<svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"></path>
							</svg>
						}
					}
					{{ category.title }}
				</h3>
				<ul class="space-y-4 text-zinc-600 font-light">
					@for (item of category.items; track item) {
						<li class="flex items-center gap-3"><span class="w-1.5 h-1.5 bg-zinc-300 rounded-full"></span> {{ item }}</li>
					}
				</ul>
			</div>
		}
	</div>
</div>
