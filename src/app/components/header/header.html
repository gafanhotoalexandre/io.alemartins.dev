<header class="w-full max-w-5xl mx-auto px-6 py-8 md:py-12 flex justify-between items-center z-40 bg-transparent">
	<a
		routerLink="/"
		class="text-lg font-medium tracking-tight text-zinc-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-900 focus-visible:ring-offset-4 flex items-center gap-2 group rounded-sm"
	>
		<div
			class="w-6 h-6 rounded-sm bg-zinc-900 text-white flex items-center justify-center text-xs font-bold transition-transform group-hover:scale-105 pr-px"
		>
			{{ brand().initials }}
		</div>
		{{ brand().displayName }}
	</a>

	<div class="flex items-center gap-4 md:gap-8">
		<nav class="hidden md:flex gap-8 text-sm" aria-label="Seções do portfólio">
			@for (tab of tabs(); track tab.id) {
				<a
					[routerLink]="tab.path"
					class="nav-link focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-900 focus-visible:ring-offset-4 rounded-sm"
					[class.active-tab]="currentTab() === tab.id"
					[id]="'desktop-tab-' + tab.id"
					[attr.aria-label]="tab.ariaLabel"
					[attr.aria-current]="currentTab() === tab.id ? 'page' : null"
				>
					{{ tab.label }}
				</a>
			}
		</nav>

		<a
			routerLink="/blog"
			routerLinkActive="active-tab"
			[routerLinkActiveOptions]="{ exact: true }"
			class="nav-link text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-900 focus-visible:ring-offset-4 rounded-sm"
		>
			Blog
		</a>
	</div>
</header>
